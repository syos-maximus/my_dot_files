
# #######################################################################################
# Sebastian Ortegas Hyprland Config 
# #######################################################################################

# My other config files
 source = ~/.config/hypr/layout.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,3440x1440@164.90,0x0,1,cm,auto,vrr,2
# Switch to below if I want to turn off vrr
#monitor=,3440x1440@164.90,0x0,1,cm,auto,vrr,0

#monitor=,3440x1440@164.90,0x0,1,cm,auto,vrr,2
#monitor name,resolution@hz,position,scale,colormode,color mmode option, variable refresh, 1=always 2=only in full screen
#monitor=,preferred,auto,auto
## trying to enable hdr via gamescope (called by steam)
#debug {
#    full_cm_proto = true
#}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
#$fileManager = dolphin
$fileManager = thunar
$menu = rofi -show drun --allow-images


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#starting openrgb
exec-once = openrgb -p rotateeffect
#uncomment to add hypridle 
exec-once = hypridle

exec-once = hyprpaper
exec-once = jamesdsp --tray
exec-once = waybar & swaync 
exec-once = /usr/lib/polkit-kde-authentication-agent-1
#exec-once = xrandr --output DP-3 --primary
#puts the curser on workspace 1 after login
exec-once = hyprctl dispatch workspace 1
############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct


# https://wiki.hyprland.org/Configuring/Variables/#misc
#misc {
#    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
#    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
#    vrr = 1
#}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Additional Key binds added by S.Ortega
bind = , PRINT, exec, hyprshot -m window
bind = $mainMod, PRINT, exec, hyprshot -m region
bind = $CTRL_ALT, DELETE,  exec, hyprlock

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
#Script calls
bind = $mainMod, O, exec, ghostty -e openrgb -p rotateeffect #adding hotkey to reload RGB profile

# my TUI applications
bind = $mainMod, B, exec, ghostty -e bluetui # bluetooth manager in terminal
bind = $mainMod, A, exec, ghostty -e wiremix # audio interface via pipewire
bind = $mainMod, W, exec, ghostty -e weechat # IRC chat client

#rofi options
# Note that scripts have been placed in ~/.local/bin
# the above location has been added to path with the following command
# set -p PATH ~/.local/bin
bind = $mainMod, escape, exec, rofi -show power-menu -modi power-menu:rofi-power-menu # Rofi power menu 

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Binding workspace to specific monitor
workspace = 1,monitor:DP-3
workspace = 3,monitor:DP-3
workspace = 5,monitor:DP-3
workspace = 7,monitor:DP-3
workspace = 2,monitor:DP-3
workspace = 4,monitor:DP-3
workspace = 6,monitor:DP-3
workspace = 8,monitor:DP-3
# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
#windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
#windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# inhibit idle for full screen app
#windowrulev2 = idleinhibit fullscreen, class:.*

# This line puts any game launched from steam into full screen
# This is good because Fullscreen has oppacity of 1, no border and no rounding

##### Defining window rules#######
windowrule = fullscreen on, match:class = steam_app_(.*)
#hl.window_rule({
#  name = "opaque_rustdesk",
#  match = {
#    class = "rustdesk"
#  },
#  opacity = "1.0 override 1.0 override 1.0 override"
#})

windowrule {
    name = rustdesk_set
    match:class = rustdesk
    float = on
    opacity = 1.0 override 1.0 override 1.0 override
    size = 1920 1080
}

windowrule {
    name = youtube
    match:class = WebApp-youtube8565
    float = off
    opacity = 1.0 override 1.0 override 1.0 override
    border_size = 0
    size = 1920 1080
}
